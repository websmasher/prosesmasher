name: Manual Release

permissions:
  contents: write
  id-token: write

on:
  workflow_dispatch:

jobs:
  release-plz:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      prosesmasher_tag: ${{ steps.released-prosesmasher.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Release-plz release
        id: release
        uses: release-plz/action@v0.5
        with:
          command: release
          config: apps/prosesmasher/release-plz.toml
          manifest_path: apps/prosesmasher/Cargo.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Extract released prosesmasher tag
        id: released-prosesmasher
        env:
          RELEASES: ${{ steps.release.outputs.releases }}
        run: |
          set -euo pipefail
          if [ -z "${RELEASES}" ] || [ "${RELEASES}" = "[]" ]; then
            echo "tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          tag="$(echo "$RELEASES" | jq -r '.[] | select(.package_name == "prosesmasher") | .tag' | head -n1)"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  dist:
    name: Dist
    needs: release-plz
    if: ${{ needs.release-plz.outputs.prosesmasher_tag != '' }}
    uses: ./.github/workflows/dist.yml
    with:
      tag: ${{ needs.release-plz.outputs.prosesmasher_tag }}
    secrets: inherit
