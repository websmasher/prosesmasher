# =============================================================================
# deny.toml -- GENERATED by guardrail3 (profile: service)
# DO NOT EDIT -- regenerate with: guardrail3 generate
# =============================================================================

[graph]
all-features = true
no-default-features = false

# ============================================================
# DEPENDENCY BANS
# ============================================================
[bans]
multiple-versions = "deny"
# Workspace path dependencies (e.g., domain = { path = "../domain" }) have no version spec.
# cargo-deny 0.19+ flags these as wildcards. Allow them.
wildcards = "allow"
allow-wildcard-paths = true
highlight = "all"

skip = [
]

deny = [
    # --- JSON: standardize on serde_json ---
    { name = "simd-json", wrappers = [] },
    { name = "json5", wrappers = [] },
    { name = "sonic-rs", wrappers = [] },
    # --- TLS: standardize on rustls (no OpenSSL) ---
    { name = "openssl", wrappers = [] },
    { name = "openssl-sys", wrappers = [] },
    # --- HTTP: standardize on reqwest ---
    { name = "ureq", wrappers = [] },
    { name = "surf", wrappers = [] },
    { name = "isahc", wrappers = [] },
    # --- Logging: standardize on tracing ---
    { name = "log4rs", wrappers = [] },
    { name = "env_logger", wrappers = [] },
    { name = "simple_logger", wrappers = [] },
    { name = "fern", wrappers = [] },
    # --- Async runtime: standardize on tokio ---
    { name = "async-std", wrappers = [] },
    { name = "smol", wrappers = [] },
    # --- Error handling: standardize on thiserror ---
    { name = "anyhow", wrappers = [] },
    # --- Web framework: standardize on axum ---
    { name = "actix-web", wrappers = [] },
    { name = "rocket", wrappers = [] },
    { name = "warp", wrappers = [] },
    { name = "poem", wrappers = [] },
    # --- Datetime: standardize on time crate ---
    { name = "chrono", wrappers = [] },
    # --- ORM: standardize on sqlx ---
    { name = "diesel", wrappers = [] },
    { name = "sea-orm", wrappers = [] },
    # --- Serialization: no competing binary formats ---
    { name = "bincode", wrappers = [] },
    { name = "rmp-serde", wrappers = [] },
    { name = "prost", wrappers = [] },
    { name = "flatbuffers", wrappers = [] },
    # --- Parsing: use structured parsers, never regex ---
    { name = "regex", wrappers = ["tree-sitter", "globset", "ignore"] }, # EXCEPTION: transitive only
    { name = "fancy-regex", wrappers = [] },
    { name = "onig", wrappers = [] },
    { name = "pcre2", wrappers = [] },
    { name = "grep-cli", wrappers = [] },
    { name = "grep-regex", wrappers = [] },
    { name = "grep-matcher", wrappers = [] },
]

# Feature-level bans -- prevent agents from enabling kitchen-sink features
[[bans.features]]
name = "tokio"
deny = ["full"]
# Force explicit feature selection instead of enabling everything
allow = ["rt-multi-thread", "macros", "net", "sync", "signal", "bytes", "default", "io-util", "time"]

# ============================================================
# LICENSE CHECKING
# ============================================================
[licenses]
# All licenses are denied unless explicitly listed here
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
    "BSL-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

# Workspace crates with `publish = false` don't need a license field
[licenses.private]
ignore = true

# ============================================================
# SECURITY ADVISORY CHECKING
# ============================================================
[advisories]
# unmaintained: check workspace deps only (transitive unmaintained crates are not actionable)
unmaintained = "workspace"
yanked = "warn" # EXCEPTION: yanked crates in transitive deps are not actionable -- warn instead of deny
ignore = []

# ============================================================
# SOURCE RESTRICTIONS
# ============================================================
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
